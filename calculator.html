<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="display">
            <div class="display_icons">

                <a href="#"><i class="fa-solid fa-clock-rotate-left"></i> </a>
                <a href="#"><i class="fa-solid fa-ruler-horizontal"></i></a>
                <a href="#"><i class="fa-solid fa-calculator"></i></a>
                
            </div>

        </div>
        <div class="buttuns">
            <button class="btn">C</button>
            <button class="btn">()</button>
            <button class="btn">%</button>
            <button class="btn"><a href="#"><i class="fa-solid fa-divide"></i></a></button>
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn">X</button>
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn">-</button>
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn">+</button>
            <button class="btn">+/-</button>
            <button class="btn">0</button>
            <button class="btn">.</button>
            <button class="btn">=</button>
            

        </div>
    </div>
    
</body>
</html>
